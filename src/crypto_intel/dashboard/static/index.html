<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Intel Bot — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a26;
            --border: #1e1e2e;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-yellow: #eab308;
            --accent-blue: #6366f1;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: background 0.2s, border-color 0.2s;
        }
        .card:hover {
            background: var(--bg-card-hover);
            border-color: #2a2a3e;
        }
        .glow-green { box-shadow: 0 0 20px rgba(34, 197, 94, 0.08); }
        .glow-red   { box-shadow: 0 0 20px rgba(239, 68, 68, 0.08); }
        .pulse-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
        .risk-badge {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .risk-low    { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .risk-medium { background: rgba(234, 179, 8, 0.15);  color: #eab308; }
        .risk-high   { background: rgba(239, 68, 68, 0.15);  color: #ef4444; }
        .sentiment-bar {
            height: 4px;
            border-radius: 2px;
            background: #1e1e2e;
            overflow: hidden;
        }
        .sentiment-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.6s ease-out;
        }
        .skeleton {
            background: linear-gradient(90deg, #1e1e2e 25%, #2a2a3e 50%, #1e1e2e 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="border-b" style="border-color: var(--border); background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg flex items-center justify-center text-xl" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
                        <polyline points="16 7 22 7 22 13"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight" style="color: var(--text-primary);">Crypto Intel Bot</h1>
                    <div class="flex items-center gap-2 mt-0.5">
                        <div class="pulse-dot"></div>
                        <span class="text-xs" style="color: var(--accent-green);">Live</span>
                        <span class="text-xs" style="color: var(--text-secondary);" id="last-updated"></span>
                    </div>
                </div>
            </div>
            <a href="https://discord.com/oauth2/authorize" target="_blank" rel="noopener"
               class="hidden sm:inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-white transition-all hover:scale-105"
               style="background: #5865F2;">
                <svg width="18" height="14" viewBox="0 0 71 55" fill="white">
                    <path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.7 40.7 0 00-1.8 3.7 54 54 0 00-16.2 0A39.2 39.2 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 4.9a.2.2 0 00-.1.1C1.5 18.7-.9 32.2.3 45.5v.1a58.7 58.7 0 0017.7 9a.2.2 0 00.3-.1 42 42 0 003.6-5.9.2.2 0 00-.1-.3 38.6 38.6 0 01-5.5-2.6.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 41.9 41.9 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .3 36.3 36.3 0 01-5.5 2.7.2.2 0 00-.1.3 47 47 0 003.6 5.9.2.2 0 00.2.1 58.5 58.5 0 0017.7-9v-.1c1.4-15-2.3-28.4-9.8-40.1a.2.2 0 00-.1-.1zM23.7 37.3c-3.5 0-6.3-3.2-6.3-7.1s2.8-7.1 6.3-7.1 6.4 3.2 6.3 7.1c0 3.9-2.8 7.1-6.3 7.1zm23.2 0c-3.5 0-6.3-3.2-6.3-7.1s2.8-7.1 6.3-7.1 6.4 3.2 6.3 7.1c0 3.9-2.7 7.1-6.3 7.1z"/>
                </svg>
                Add to Discord
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
        <!-- Market Overview -->
        <section>
            <h2 class="text-sm font-semibold uppercase tracking-wider mb-4" style="color: var(--text-secondary);">Market Overview</h2>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="market-cards">
                <div class="card p-5">
                    <div class="skeleton h-3 w-16 mb-3"></div>
                    <div class="skeleton h-7 w-28 mb-2"></div>
                    <div class="skeleton h-3 w-20"></div>
                </div>
                <div class="card p-5">
                    <div class="skeleton h-3 w-16 mb-3"></div>
                    <div class="skeleton h-7 w-28 mb-2"></div>
                    <div class="skeleton h-3 w-20"></div>
                </div>
                <div class="card p-5">
                    <div class="skeleton h-3 w-16 mb-3"></div>
                    <div class="skeleton h-7 w-28 mb-2"></div>
                    <div class="skeleton h-3 w-20"></div>
                </div>
                <div class="card p-5">
                    <div class="skeleton h-3 w-16 mb-3"></div>
                    <div class="skeleton h-7 w-28 mb-2"></div>
                    <div class="skeleton h-3 w-20"></div>
                </div>
            </div>
        </section>

        <!-- Bot Statistics -->
        <section>
            <h2 class="text-sm font-semibold uppercase tracking-wider mb-4" style="color: var(--text-secondary);">Bot Statistics</h2>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="stats-cards">
                <div class="card p-5">
                    <div class="skeleton h-3 w-16 mb-3"></div>
                    <div class="skeleton h-7 w-20"></div>
                </div>
                <div class="card p-5">
                    <div class="skeleton h-3 w-16 mb-3"></div>
                    <div class="skeleton h-7 w-20"></div>
                </div>
                <div class="card p-5">
                    <div class="skeleton h-3 w-16 mb-3"></div>
                    <div class="skeleton h-7 w-20"></div>
                </div>
                <div class="card p-5">
                    <div class="skeleton h-3 w-16 mb-3"></div>
                    <div class="skeleton h-7 w-20"></div>
                </div>
            </div>
        </section>

        <!-- Recent Analyses -->
        <section>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-semibold uppercase tracking-wider" style="color: var(--text-secondary);">Recent Analyses</h2>
                <span class="text-xs" style="color: var(--text-secondary);">Auto-refreshes every 60s</span>
            </div>
            <div class="card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--border);">
                                <th class="text-left px-5 py-3 font-medium text-xs uppercase tracking-wider" style="color: var(--text-secondary);">Token</th>
                                <th class="text-left px-5 py-3 font-medium text-xs uppercase tracking-wider" style="color: var(--text-secondary);">Risk Level</th>
                                <th class="text-left px-5 py-3 font-medium text-xs uppercase tracking-wider" style="color: var(--text-secondary);">Sentiment</th>
                                <th class="text-left px-5 py-3 font-medium text-xs uppercase tracking-wider hidden sm:table-cell" style="color: var(--text-secondary);">Price</th>
                                <th class="text-right px-5 py-3 font-medium text-xs uppercase tracking-wider" style="color: var(--text-secondary);">Time</th>
                            </tr>
                        </thead>
                        <tbody id="analyses-body">
                            <tr>
                                <td colspan="5" class="px-5 py-8 text-center">
                                    <div class="skeleton h-4 w-48 mx-auto mb-3"></div>
                                    <div class="skeleton h-4 w-64 mx-auto mb-3"></div>
                                    <div class="skeleton h-4 w-56 mx-auto"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="border-t mt-12 py-8" style="border-color: var(--border);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs" style="color: var(--text-secondary);">
            <div class="flex items-center gap-4">
                <a href="https://github.com/gcasti256/crypto-intel-bot" target="_blank" rel="noopener"
                   class="flex items-center gap-1.5 hover:text-white transition-colors">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                    GitHub
                </a>
                <span>&middot;</span>
                <span>Built by George Castillo</span>
            </div>
            <div class="flex items-center gap-1.5">
                Powered by
                <span class="font-medium text-white">LangGraph</span>
                +
                <span class="font-medium text-white">CoinGecko</span>
            </div>
        </div>
    </footer>

    <script>
        const API_BASE = window.location.origin;
        const REFRESH_INTERVAL = 60_000;

        function formatCurrency(n) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: n >= 1 ? 2 : 4 }).format(n);
        }

        function formatNumber(n) {
            if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
            if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
            return n.toLocaleString();
        }

        function formatChange(pct) {
            const sign = pct >= 0 ? '+' : '';
            const color = pct >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
            const arrow = pct >= 0 ? '&#9650;' : '&#9660;';
            return `<span style="color: ${color};">${arrow} ${sign}${pct.toFixed(2)}%</span>`;
        }

        function timeAgo(iso) {
            const diff = (Date.now() - new Date(iso).getTime()) / 1000;
            if (diff < 60) return 'just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            return Math.floor(diff / 86400) + 'd ago';
        }

        function sentimentColor(score) {
            if (score >= 0.6) return 'var(--accent-green)';
            if (score >= 0.4) return 'var(--accent-yellow)';
            return 'var(--accent-red)';
        }

        function riskClass(level) {
            return 'risk-' + level.toLowerCase();
        }

        function renderMarketCards(data) {
            const cards = [
                { label: 'Bitcoin', value: formatCurrency(data.btc_price), change: data.btc_24h_change, icon: '₿' },
                { label: 'Ethereum', value: formatCurrency(data.eth_price), change: data.eth_24h_change, icon: 'Ξ' },
                { label: 'Fear & Greed', value: data.fear_greed_index, change: null, icon: '◎', sub: data.fear_greed_label },
                { label: 'BTC Dominance', value: data.btc_dominance.toFixed(1) + '%', change: null, icon: '◈', sub: 'Market share' },
            ];

            document.getElementById('market-cards').innerHTML = cards.map((c, i) => {
                const glowClass = c.change != null ? (c.change >= 0 ? 'glow-green' : 'glow-red') : '';
                return `
                <div class="card p-5 fade-in ${glowClass}" style="animation-delay: ${i * 60}ms;">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs font-medium" style="color: var(--text-secondary);">${c.label}</span>
                        <span class="text-lg opacity-40">${c.icon}</span>
                    </div>
                    <div class="text-2xl font-bold tracking-tight mb-1">${c.value}</div>
                    ${c.change != null ? `<div class="text-xs">${formatChange(c.change)}<span style="color: var(--text-secondary);"> 24h</span></div>` : ''}
                    ${c.sub ? `<div class="text-xs" style="color: var(--text-secondary);">${c.sub}</div>` : ''}
                </div>`;
            }).join('');
        }

        function renderStats(data) {
            const stats = [
                { label: 'Servers', value: formatNumber(data.servers), icon: '⬡' },
                { label: 'Users', value: formatNumber(data.users), icon: '⬢' },
                { label: 'Analyses', value: formatNumber(data.analyses_performed), icon: '◇' },
                { label: 'Alerts Triggered', value: formatNumber(data.alerts_triggered), icon: '◆' },
            ];

            document.getElementById('stats-cards').innerHTML = stats.map((s, i) => `
                <div class="card p-5 fade-in" style="animation-delay: ${i * 60}ms;">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs font-medium" style="color: var(--text-secondary);">${s.label}</span>
                        <span class="text-lg opacity-40">${s.icon}</span>
                    </div>
                    <div class="text-2xl font-bold tracking-tight">${s.value}</div>
                </div>`).join('');
        }

        function renderAnalyses(analyses) {
            if (!analyses.length) {
                document.getElementById('analyses-body').innerHTML = `
                    <tr><td colspan="5" class="px-5 py-12 text-center" style="color: var(--text-secondary);">
                        No analyses yet. Use /analyze in Discord to get started.
                    </td></tr>`;
                return;
            }

            document.getElementById('analyses-body').innerHTML = analyses.map((a, i) => `
                <tr class="fade-in" style="border-bottom: 1px solid var(--border); animation-delay: ${i * 40}ms;">
                    <td class="px-5 py-3.5">
                        <div class="flex items-center gap-2">
                            <span class="font-semibold">${a.token_symbol}</span>
                            <span class="text-xs" style="color: var(--text-secondary);">${a.token_name}</span>
                        </div>
                    </td>
                    <td class="px-5 py-3.5">
                        <span class="risk-badge ${riskClass(a.risk_level)}">${a.risk_level}</span>
                    </td>
                    <td class="px-5 py-3.5">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-mono" style="color: ${sentimentColor(a.sentiment_score)};">${(a.sentiment_score * 100).toFixed(0)}%</span>
                            <div class="sentiment-bar w-16">
                                <div class="sentiment-fill" style="width: ${a.sentiment_score * 100}%; background: ${sentimentColor(a.sentiment_score)};"></div>
                            </div>
                        </div>
                    </td>
                    <td class="px-5 py-3.5 hidden sm:table-cell">
                        <span class="font-mono text-xs">${a.price ? formatCurrency(a.price) : '—'}</span>
                    </td>
                    <td class="px-5 py-3.5 text-right">
                        <span class="text-xs" style="color: var(--text-secondary);">${timeAgo(a.timestamp)}</span>
                    </td>
                </tr>`).join('');
        }

        async function fetchJSON(path) {
            try {
                const res = await fetch(API_BASE + path);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error(`Failed to fetch ${path}:`, err);
                return null;
            }
        }

        async function refresh() {
            const [market, stats, analysesRes] = await Promise.all([
                fetchJSON('/api/market'),
                fetchJSON('/api/stats'),
                fetchJSON('/api/analyses'),
            ]);

            if (market) renderMarketCards(market);
            if (stats)  renderStats(stats);
            if (analysesRes) renderAnalyses(analysesRes.analyses || []);

            document.getElementById('last-updated').textContent =
                '· Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Initial load + auto-refresh
        refresh();
        setInterval(refresh, REFRESH_INTERVAL);
    </script>
</body>
</html>
